version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        
        build:
          commands:
            - env | grep NEXT_PUBLIC_ >> .env.production
            - echo "AUTH_TRUST_HOST=$AUTH_TRUST_HOST" >> .env.production
            - echo "AUTH_SECRET=$AUTH_SECRET" >> .env.production
            - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
