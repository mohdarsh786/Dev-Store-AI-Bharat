version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            # Inject variables into the Next.js runtime
            - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
            - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env.production
            - echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
