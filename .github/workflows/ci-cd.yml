name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest tests/test_models.py tests/test_models_basic.py tests/test_models_validation.py tests/test_ranking_features.py -v --tb=short
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: mock_key
          AWS_SECRET_ACCESS_KEY: mock_secret
          DATABASE_URL: postgresql://mock:mock@localhost/mock
          NEON_DATABASE_URL: postgresql://mock:mock@localhost/mock
          PINECONE_API_KEY: mock_key
          PINECONE_INDEX_NAME: devstore_resources
          PINECONE_ENVIRONMENT: mock
          BEDROCK_MODEL_ID: anthropic.claude-3-5-sonnet-20240620-v1:0
          BEDROCK_EMBEDDING_MODEL_ID: amazon.titan-embed-text-v2:0
          SECRET_KEY: mock_secret_key_for_ci_testing_only

      - name: Lint check
        run: |
          cd backend
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,__pycache__

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to Render
        run: echo "Render auto-deploys from main branch on push"
